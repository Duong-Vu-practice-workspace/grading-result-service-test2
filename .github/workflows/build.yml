name: Build, Push Docker, Release JAR

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/grading-result
  CONFIG_REPO: Duong-Vu-practice-workspace/grading-config-test2
  SERVICE_NAME: result-service

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Determine version
        id: version
        run: |
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            VERSION="v1.0.0"
          else
            TAG_NUM=$(echo "$LATEST_TAG" | sed 's/v//')
            MAJOR=$(echo "$TAG_NUM" | cut -d. -f1)
            MINOR=$(echo "$TAG_NUM" | cut -d. -f2)
            PATCH=$(echo "$TAG_NUM" | cut -d. -f3)
            NEXT_PATCH=$((PATCH + 1))
            VERSION="v$MAJOR.$MINOR.$NEXT_PATCH"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Determined version: $VERSION"

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create GitHub Release with JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ env.SERVICE_NAME }} ${{ steps.version.outputs.VERSION }}
          prerelease: true
          files: target/*.jar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}

      - name: Update config repo (ArgoCD)
        env:
          GH_TOKEN: ${{ secrets.CONFIG_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${{ env.GH_TOKEN }}@github.com/Duong-Vu-practice-workspace/grading-config-test2.git config-repo
          cd config-repo
          sed -i 's|tag: .*|tag: "${{ steps.version.outputs.VERSION }}"|' values-stg.yaml
          git config user.email "ci@grading-platform.com"
          git config user.name "GitHub CI"
          git add .
          git diff --staged --quiet || git commit -m "Update ${{ env.SERVICE_NAME }} to ${{ steps.version.outputs.VERSION }}"
          git push
